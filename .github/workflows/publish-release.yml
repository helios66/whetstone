name: Publish

on:
  release:
    types: [published]
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # RELEASE_TOKEN is a classic PAT owned by this fork. actions/checkout persists it as the
          # git credential for the rest of the job so the post-release SNAPSHOT bump can push to the
          # protected `main` branch (add the token's account to the branch-protection bypass list).
          # Required scopes:
          #   - repo            : push the version-bump commit to main
          #   - write:packages  : publish to helios66/whetstone-private (read:packages is implied)
          #   - read:packages   : resolve Mundus from helios66/mundus during the build
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Set JDK version
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate version
        id: version
        run: |
          VERSION_NAME=$(grep "^VERSION_NAME=" gradle.properties | cut -d'=' -f2)

          if [[ "${{ github.event_name }}" == "release" ]]; then
            # For releases, validate it's not a SNAPSHOT
            if [[ "$VERSION_NAME" == *SNAPSHOT* ]]; then
              echo "Error: Release version cannot contain SNAPSHOT: $VERSION_NAME"
              echo "Please update VERSION_NAME in gradle.properties to a release version (e.g., 1.2.3)"
              exit 1
            fi

            # Validate version format
            if [[ ! "$VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Error: Invalid version format '$VERSION_NAME'. Expected format: X.Y.Z"
              exit 1
            fi

            echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "Publishing release version: $VERSION_NAME"
          else
            # For main branch, validate it IS a SNAPSHOT
            if [[ "$VERSION_NAME" != *SNAPSHOT* ]]; then
              echo "Error: Main branch must have SNAPSHOT version, found: $VERSION_NAME"
              echo "Skipping publish for non-snapshot version on main branch."
              exit 0
            fi

            echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Publishing snapshot version: $VERSION_NAME"
          fi

      - name: Run tests
        env:
          # The sample resolves Mundus from the helios66/mundus GitHub Packages registry; the build
          # credentials block reads these (gpr.user/gpr.key fall back to GITHUB_ACTOR/GITHUB_TOKEN).
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: ./gradlew build

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
            echo "Publishing version ${{ steps.version.outputs.version }} to GitHub Packages"
            # Library modules (root subprojects) + the Gradle plugin (included build) -> the
            # GitHubPackages maven repo wired in build.gradle.kts / whetstone-gradle-plugin.
            ./gradlew clean -x test -x lint \
              publishAllPublicationsToGitHubPackagesRepository \
              :whetstone-gradle-plugin:publishAllPublicationsToGitHubPackagesRepository
            echo "Published to https://maven.pkg.github.com/helios66/whetstone-private"
            echo "Verify: https://github.com/helios66/whetstone-private/packages"

      - name: Bump to next SNAPSHOT version
        if: github.event_name == 'release' && steps.version.outputs.is_release == 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Parse version components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Increment patch version for next development cycle
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-SNAPSHOT"

          echo "Bumping version to: $NEXT_VERSION"

          # Update gradle.properties
          sed -i.bak "s/^VERSION_NAME=.*/VERSION_NAME=$NEXT_VERSION/" gradle.properties
          rm gradle.properties.bak

          # Author the commit as the GitHub Actions bot. The push uses the RELEASE_TOKEN credential
          # persisted by actions/checkout; if `main` is branch-protected, add the token's account to
          # the bypass list (the default GITHUB_TOKEN cannot push to a protected branch).
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Checkout main branch (release events check out tags, leaving us in detached HEAD)
          git checkout main
          git pull --ff-only origin main

          # Commit and push
          git add gradle.properties
          git commit -m "Prepare next development version ${NEXT_VERSION}"
          git push origin main

          echo "Committed and pushed next development version: $NEXT_VERSION"
