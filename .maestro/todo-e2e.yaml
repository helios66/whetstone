# Maestro e2e flow for the Whetstone sample Todo app (release build).
#
# The app has NO in-app scripted flow — Maestro drives the entire journey. The ViewModel seeds a
# couple of todos so there's content to render/score. This flow exercises the full Mundus tracing
# surface and lets the runner capture + validate the trace:
#   - launch -> the seeded list renders (client Compose bodies, getMessage @TraceArg at startup)
#   - open Stats -> StatsScreen triggers refreshStats -> computeStatsScore: scoreFor over the todos,
#     the manual beginTokenWith span, all @AutoTrace/@NoTrace fixtures, the probe, and the cancellation
#   - open a todo's Detail screen (detail composables)
#   - background the app so Mundus flushes its streaming trace before the runner pulls it
#
# Driven by scripts/mundus-trace-scenarios.sh — every mode uses this one flow (the `e2e` mode
# produces a reviewable release trace; `both` runs the full gauntlet across build variants).
appId: com.unpopulardev.whetstone.sample
---
# NOTE: no `clearState` — the runner uninstalls+reinstalls a fresh APK per variant, and the app keeps
# no persistent state (in-memory mutableStateListOf), so a clean slate is already guaranteed. Some OEM
# devices also reject `pm clear` from adb (SecurityException: no CLEAR_APP_USER_DATA permission), which
# would fail launchApp.
- launchApp

# the seeded list renders — extendedWaitUntil (not assertVisible) tolerates a slow cold start (debug
# build + no baseline profile + heavy Mundus compose tracing can be ~8s on a slow physical device).
- extendedWaitUntil:
    visible: "Email the client.*"
    timeout: 30000

# --- Stats screen: fires refreshStats -> computeStatsScore (scoreFor, manual span, all fixtures,
#     probe, cancellation). Wait until the score card is composed. ---
- tapOn:
    text: "Stats"
- extendedWaitUntil:
    visible: "Priority score"
    timeout: 10000
- back

# --- a todo's Detail screen (detail composables + editTodo path) ---
- tapOn:
    text: "Open"
- assertVisible: "Save"
- back

# settle so the background suspend work flushes, then background the app for a clean trace pull
- waitForAnimationToEnd
- pressKey: Home
